# Independent review checklist

## Binary/API verification

All items below were confirmed on 0.3.1 via a real reflection load of the
user's own `Assembly-CSharp.dll`, `ContractConfigurator.dll`, `0Harmony.dll`
and `Kerbalism112.kbin` -- see `docs/VALIDATION_3_32.md` for the full dump.
They are kept here, checked off, so future changes can be diffed against a
known-good baseline instead of re-guessing from scratch.

- [x] Kerbalism assembly is located by the presence of the `KERBALISM.Experiment`
      type (not by assembly simple name, which is not assumed to be `Kerbalism`).
- [x] `KERBALISM.Experiment.State` is `RunningState State { get; set; }` -- has a setter.
- [x] `KERBALISM.Experiment.Subject` is `SubjectData Subject { get; }`.
- [x] `KERBALISM.SubjectData.StockSubjectId` exists as `String StockSubjectId { get; set; }`.
- [x] `KERBALISM.SubjectData.ExpInfo.ExperimentId` exists (`ExpInfo`: `ExperimentInfo { get; set; }`; `ExperimentId`: `String { get; set; }`).
- [x] `KERBALISM.File.transmitRate` exists as `Double transmitRate` (field).
- [x] `KERBALISM.HardDrive.drive` exists as a `Drive` field (not `files`/`Files`
      directly on HardDrive -- confirms the 0.3.0 fix); `KERBALISM.Drive.files`
      is `Dictionary<string, File>`-shaped and enumerates as `KeyValuePair`.
- [x] Contract Configurator's real type is
      `ContractConfigurator.Parameters.CollectScienceCustom`.
- [x] Its members are `experiment` (`List<string>`), `recoveryDone`
      (`Dictionary<string, bool>`), `CheckSubject(string, ScienceSubject)`,
      `UpdateDelegates()`, and `OnUpdate()` -- all confirmed present with
      these exact names and signatures.
- [x] `CheckVessel` has exactly one overload,
      `CheckVessel(Vessel vessel, bool forceStateChange = false)` -- there is
      no 1-argument overload. `CanCheckVesselMeetsCondition(Vessel)` and
      `GetParameterGroupHost()` are both confirmed present as written.
- [x] The stock `ScienceSubject(string, string, float, float, float)`
      constructor used by `ResolveSubject()`'s fallback is confirmed to
      exist with exactly that parameter order (id, title, dataScale,
      subjectValue, scienceCap). `ScienceExperiment.dataScale`,
      `.scienceCap` and `.experimentTitle` are confirmed public fields.
- [x] `KERBALISM.Drive.GetDrives(Vessel, bool)` and
      `GetDrives(ProtoVessel, bool)` confirmed as static, unambiguous
      overloads (resolved via `GetMethod(name, Type[])`, not by name alone).
- [x] `Vessel.protoVessel` (field) and `Vessel.loaded` (field) confirmed on
      the real `Vessel` type.

Not confirmable by reflection (behavioural, not structural -- still open):

- [ ] Confirm `CheckSubject(experimentId, ScienceSubject)` only reads the
      subject's id/body/situation/biome, not `science`/`scienceCap` values
      that a transient (non-R&D) subject would leave at defaults.
- [ ] Confirm `ResearchAndDevelopment.GetExperiment(experimentId)` returns a
      valid `ScienceExperiment` for the experiments used by the target
      contract pack, so the transient-subject fallback gets a real
      `dataScale`/`scienceCap` rather than the 1f/1f default.

## Behaviour tests

**0.5.0 changed the core matching logic for every `CollectScience`
parameter, not just ROC-related ones.** These are the highest-priority
items to test, since a regression here would affect contracts that were
working before:

- [ ] A plain, single-biome, single-situation `CollectScience` objective
      (e.g. a Field Research biome study) still completes correctly via
      `MatchesOwnCriteria()`, and does not fire early/incorrectly for the
      wrong biome or situation. **Still pending** -- only the ROC/scanning-
      arm case has been tested in-game so far.
- [ ] A `CollectScience` objective with no `biome` constraint set (body +
      situation only) is not incorrectly restricted to one biome by this
      change (biome should remain a wildcard when unset).
- [ ] A `CollectScience` objective with no `situation`/`location`
      constraint (e.g. "any situation on this body") behaves the same way.
- [x] The originally reported ROC case ("Scan Mun Large Crater") now
      completes when transmission starts -- confirmed via `KSP.log`
      showing "satisfied CollectScience experiment 'ROCScience_MunLargeCrater'
      from TransmissionStarted: ...", and the vessel's biome now correctly
      reading "Highlands" (matching the in-game/MechJeb display) after the
      0.5.2 degrees/radians fix.
- [ ] `matchingSubjects` remaining empty (expected, given the root cause)
      does not produce any new false completions -- `ownCriteriaMatch`
      should not be so permissive that it matches vessels/situations it
      shouldn't.

These require a running KSP/Unity process and cannot be done from source
or reflection alone. None of them are satisfied by the 0.3.1 build/reflection
verification above.

- [ ] A stock experiment still completes normally without Kerbalism evidence.
- [ ] Starting the right experiment in the right biome completes the objective.
- [ ] Starting it in a wrong biome does not complete the objective.
- [ ] Starting it in a wrong situation does not complete the objective.
- [ ] Starting a different experiment with a similar ID does not complete it.
- [ ] Merely toggling an experiment that has no resolved SubjectData does not
      complete it.
- [ ] A matching sample experiment completes when started.
- [ ] Beginning actual transmission completes a matching file objective.
- [ ] Marking a file for transmission while disconnected does not complete it.
- [ ] Evidence from one vessel does not survive a scene change.
- [ ] A completed Contract Configurator parameter remains complete after save/load.
- [ ] Multiple experiments in one `CollectScience` parameter are tracked
      independently.
- [ ] Evidence from vessel A cannot complete a VesselParameterGroup tracking vessel B.
- [x] Evidence from an inactive/unfocused vessel now correctly completes an
      ungrouped parameter (0.3.3 fix; confirmed broken via the user's own
      `KSP.log`, which showed evidence being recorded and then immediately
      discarded by the bridge's own now-removed active-vessel check).
- [ ] Evidence occurring before a Sequence reaches the parameter is not retained as premature `recoveryDone` state.
- [ ] Field Research five-subject contracts do not cross-complete between biomes.
- [ ] With `ignoreRecoveryMethod = false`, starting an experiment or
      transmission no longer completes the objective early; stock recovery/
      transmission requirements still apply.
- [ ] A subject with no prior R&D entry (fresh save, first time that
      experiment/situation/biome combination is ever run) still completes
      the objective on experiment start.
- [ ] A scanning-arm-style (or other private-drive) experiment now
      completes its objective when transmission starts. NOTE: the specific
      case investigated in 0.3.2/0.3.3 (`seismicScan@MunSrfLandedHighlands`)
      turned out to be this package's own bundled `test-data/GeologicalStudy.cfg`
      loaded live due to the packaging bug fixed in 0.4.0, not the user's
      actual "CRSY Light scanning arm" contract -- so this item still
      applies to genuine Contract-Configurator-based scanning-arm contracts,
      but is a separate question from the ROC bridge tests below.
- [ ] Transmission from an unloaded vessel is now detected (0.3.2 fix);
      previously this required the vessel to be loaded.

## Stock ROC scanning-arm bridge tests (0.4.0, `RocScienceArmBridge.cs`)

These cover `Expansions.Serenity.Contracts.CollectROCScienceArm`, a
Breaking Ground/Serenity stock contract, not Contract Configurator. None of
the Contract Configurator tests above exercise this code path.

- [x] The originally reported case: "Scan Mun Large Crater" now completes
      as soon as transmission of the matching Kerbalism data starts.
      **Correction:** this contract turned out to be a Contract
      Configurator "Field Research" parameter (agent "Field Research
      Team"), not the stock `CollectROCScienceArm` this section is about --
      see `CHANGES.md` 0.4.3-0.5.2 for the full investigation. It was
      confirmed fixed via `ContractScienceMatcher`'s `MatchesOwnCriteria()`
      path (0.5.0-0.5.2), not via `RocScienceArmBridge`. The items below,
      which specifically exercise `RocScienceArmBridge`/
      `CollectROCScienceArm`, remain unconfirmed in an actual game -- no
      contract encountered so far has used that stock class.
- [ ] Starting the arm scan for the wrong ROC feature/subject does not
      complete an unrelated ROC contract's parameter.
- [ ] A ROC contract that was already progressing normally (i.e. would
      eventually complete via Kerbalism's own ~95%-completion
      `OnScienceRecieved` event) is not double-completed or left in a bad
      state if both paths fire.
- [ ] Completion persists correctly after a scene change / save-reload
      (this bridge does not add its own save data for ROC contracts --
      completion state lives entirely in the stock `CollectROCScienceArm`
      parameter itself once `OnScience()` has been called).
- [ ] `CollectROCScienceRetrieval` (physical rock retrieval, not the arm)
      is confirmed to remain unaffected/unaddressed, as documented --
      it should behave exactly as it did before this plugin was installed.

## Performance tests

- [ ] Transmission polling allocates acceptably with 50+ vessels.
- [ ] Loaded HardDrive scanning remains below a negligible frame-time budget.
- [ ] Debug logging is disabled by default.
- [ ] `RocScienceArmBridge.ProcessAllEvidence()` scanning all active
      contracts on the same poll cadence as transmission scanning remains
      unnoticeable with a realistic number of active contracts (~20-30).
